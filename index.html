<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS | Орда</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🤖 AI NEXUS <span class="version">v7.0</span></h1>
        <button id="configBtn">⚙ CONFIG</button>
    </header>

    <main>
        <div class="input-section">
            <textarea id="userInput" placeholder="Введи запрос для Орды..."></textarea>
            <button id="sendBtn">ИНИЦИИРОВАТЬ ПРОТОКОЛ</button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p id="status">Подключение к нейросетям...</p>
        </div>

        <div id="resultArea" class="hidden">
            <div class="judge-card">
                <h2>👑 ВЕРДИКТ СУДЬИ (Gemini 3.1)</h2>
                <div id="finalAnswer" class="res-body"></div>
            </div>

            <div class="agents-grid">
                <div class="agent-card">
                    <h3>GPT-4o mini</h3>
                    <div id="res-github" class="res-body">Ожидание...</div>
                </div>
                <div class="agent-card">
                    <h3>Llama 3.3 70B</h3>
                    <div id="res-groq" class="res-body">Ожидание...</div>
                </div>
                <div class="agent-card">
                    <h3>Gemini 2.5 Flash</h3>
                    <div id="res-gemini-agent" class="res-body">Ожидание...</div>
                </div>
            </div>
        </div>
    </main>

    <div id="keyModal" class="modal hidden">
        <div class="modal-content">
            <h2>🔑 КЛЮЧИ ДОСТУПА</h2>
            <p>Введи API ключи для активации агентов.</p>
            <input type="password" id="ghKey" placeholder="GitHub PAT (Models)">
            <input type="password" id="grKey" placeholder="Groq API Key">
            <input type="password" id="gmAgentKey" placeholder="Gemini Agent Key (2.5)">
            <input type="password" id="gmJudgeKey" placeholder="Gemini Judge Key (3.1)">
            <div class="modal-buttons">
                <button id="saveKeys">DEPLOY (СОХРАНИТЬ)</button>
                <button id="closeModal" class="close-btn">ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
