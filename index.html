<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KalajerAI System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📡 KALAJER<span class="ai-brand">AI</span> <span class="version">v7.5</span></h1>
        <button id="configBtn">⚙ CONFIG</button>
    </header>

    <main>
        <div class="input-section">
            <textarea id="userInput" placeholder="Введите директиву для системы..."></textarea>
            <button id="sendBtn">ЗАПУСК СИСТЕМЫ</button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p id="status">KalajerAI thinking</p>
        </div>

        <div id="resultArea" class="hidden">
            <div class="judge-card">
                <h2>💠 ВЕРХОВНЫЙ ПРОТОКОЛ (CORE)</h2>
                <div id="finalAnswer" class="res-body"></div>
            </div>

            <div class="agents-grid">
                <div class="agent-card">
                    <h3>АГЕНТ: AETHER-1</h3>
                    <div id="res-github" class="res-body">Ожидание...</div>
                </div>
                <div class="agent-card">
                    <h3>АГЕНТ: VOID-2</h3>
                    <div id="res-groq" class="res-body">Ожидание...</div>
                </div>
                <div class="agent-card">
                    <h3>АГЕНТ: PULSE-3</h3>
                    <div id="res-gemini-agent" class="res-body">Ожидание...</div>
                </div>
            </div>
        </div>
    </main>

    <div id="keyModal" class="modal hidden">
        <div class="modal-content">
            <h2>🔑 СИСТЕМНЫЕ КЛЮЧИ</h2>
            <input type="password" id="ghKey" placeholder="Access Key 1">
            <input type="password" id="grKey" placeholder="Access Key 2">
            <input type="password" id="gmAgentKey" placeholder="Access Key 3">
            <input type="password" id="gmJudgeKey" placeholder="Access Key 4">
            <div class="modal-buttons">
                <button id="saveKeys">DEPLOY</button>
                <button id="closeModal" class="close-btn">ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
