<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent AI v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh;transition:background .3s,color .3s}.theme-dark{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-tertiary:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent:#6366f1;--accent-hover:#4f46e5;--border:#334155;--success:#10b981;--danger:#ef4444;--shadow:rgba(0,0,0,.3);--shadow-lg:rgba(0,0,0,.5)}body{background-color:var(--bg-primary);color:var(--text-primary)}.container{max-width:1400px;margin:0 auto;padding:0 2rem}.header{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:1.25rem 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:0 4px 6px var(--shadow)}.header-content{display:flex;justify-content:space-between;align-items:center}.logo{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-hover));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.header-controls{display:flex;gap:.75rem;align-items:center}button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:500;transition:all .25s cubic-bezier(.4,0,.2,1)}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:#fff;padding:.875rem 1.75rem;font-size:1rem;box-shadow:0 4px 12px var(--shadow)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px var(--shadow-lg)}.btn-secondary{background-color:var(--bg-tertiary);color:var(--text-primary);padding:.875rem 1.75rem;font-size:1rem;border:1px solid var(--border)}.btn-icon{background-color:var(--bg-tertiary);color:var(--text-primary);padding:.625rem 1rem;border:1px solid var(--border);border-radius:8px}.btn-success{background:linear-gradient(135deg,var(--success),#059669);color:#fff;padding:1rem 2.5rem;font-size:1.05rem;margin-top:1.5rem}.btn-danger{background:linear-gradient(135deg,var(--danger),#dc2626);color:#fff;padding:.625rem 1.25rem}.main-content{padding:3rem 0;min-height:calc(100vh - 80px)}.setup-container{max-width:900px;margin:0 auto}.setup-container h2{font-size:2.5rem;margin-bottom:.75rem;text-align:center;font-weight:700}.subtitle{text-align:center;color:var(--text-secondary);margin-bottom:3rem;font-size:1.1rem}.agents-list{display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2rem}.agent-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:1.75rem;transition:all .3s;box-shadow:0 4px 6px var(--shadow)}.agent-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 12px 24px var(--shadow-lg)}.agent-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}.agent-header-left{display:flex;align-items:center;gap:1rem;flex:1}.agent-avatar{font-size:2rem;width:3rem;height:3rem;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-hover));border-radius:12px}.agent-name-input{font-size:1.25rem;font-weight:600;background-color:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text-primary);padding:.5rem;flex:1;transition:border-color .2s}.agent-card-body{display:flex;flex-direction:column;gap:1.25rem}.form-group{display:flex;flex-direction:column;gap:.5rem}.form-group label{font-size:.875rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}.form-group input,.form-group select{background-color:var(--bg-tertiary);border:2px solid var(--border);border-radius:10px;padding:.875rem 1rem;color:var(--text-primary);font-size:1rem;transition:all .2s}.form-group input:focus,.form-group select:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.task-section{background:var(--bg-secondary);border-radius:16px;padding:2rem;margin-bottom:2rem;box-shadow:0 4px 6px var(--shadow)}.task-section textarea{width:100%;background-color:var(--bg-tertiary);border:2px solid var(--border);border-radius:12px;padding:1.25rem;color:var(--text-primary);font-family:inherit;font-size:1rem;resize:vertical;margin-bottom:1.25rem;transition:all .2s;min-height:120px}.btn-large{padding:1.125rem 2.5rem;font-size:1.1rem;width:100%}.notification{position:fixed;top:100px;right:20px;background:var(--success);color:#fff;padding:1rem 1.5rem;border-radius:12px;box-shadow:0 8px 24px var(--shadow-lg);z-index:2000;transform:translateX(400px);opacity:0;transition:all .3s}.notification.show{transform:translateX(0);opacity:1}.model-autocomplete{position:absolute;background:var(--bg-secondary);border:2px solid var(--accent);border-radius:12px;max-height:300px;overflow-y:auto;z-index:1000;box-shadow:0 12px 36px var(--shadow-lg)}.autocomplete-item{padding:.875rem 1.25rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;transition:all .2s;border-bottom:1px solid var(--border)}.autocomplete-item:hover{background:var(--bg-tertiary);padding-left:1.5rem}.api-suggestions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}.suggestion-btn{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);padding:.5rem 1rem;border-radius:8px;font-size:.875rem;transition:all .2s}.suggestion-btn:hover{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:#fff;border-color:transparent;transform:scale(1.05)}
</style>
</head>
<body class="theme-dark">
<header class="header">
<div class="container">
<div class="header-content">
<h1 class="logo">Мультиагентная AI v2.0</h1>
<div class="header-controls">
<button class="btn-secondary" id="settingsBtn">Настройки</button>
</div>
</div>
</div>
</header>
<main class="container main-content">
<div id="setupScreen">
<div class="setup-container">
<h2>Настройка AI Агентов</h2>
<p class="subtitle">Добавьте до 20 AI агентов</p>
<div class="agents-list" id="agentsList"></div>
<button class="btn-primary" id="addAgentBtn">+ Добавить агента</button>
<button class="btn-success" id="saveConfigBtn">Сохранить и продолжить</button>
</div>
</div>
</main>
<script>
const MODELS_DB={openai:['gpt-4-turbo','gpt-4','gpt-3.5-turbo'],anthropic:['claude-3-5-sonnet-20241022','claude-3-opus-20240229'],google:['gemini-pro','gemini-1.5-pro']};
const API_PROVIDERS={openai:{patterns:['openai'],defaultEndpoint:'https://api.openai.com/v1/chat/completions',defaultModels:MODELS_DB.openai,icon:'🤖',name:'OpenAI'},anthropic:{patterns:['anthropic','claude'],defaultEndpoint:'https://api.anthropic.com/v1/messages',defaultModels:MODELS_DB.anthropic,icon:'🧠',name:'Claude'},google:{patterns:['google','gemini'],defaultEndpoint:'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent',defaultModels:MODELS_DB.google,icon:'✨',name:'Gemini'}};
let agents=[];
class Agent{constructor(c={}){this.id=c.id||Date.now()+Math.random();this.name=c.name||`Agent ${this.id}`;this.endpoint=c.endpoint||'https://api.openai.com/v1/chat/completions';this.apiKey=c.apiKey||'';this.model=c.model||'gpt-3.5-turbo';this.temperature=c.temperature!==undefined?c.temperature:0.7;this.maxTokens=c.maxTokens||1000}}
function showNotif(m){const n=document.createElement('div');n.className='notification';n.textContent=m;document.body.appendChild(n);setTimeout(()=>n.classList.add('show'),10);setTimeout(()=>{n.classList.remove('show');setTimeout(()=>n.remove(),300)},2000)}
function renderAgents(){const list=document.getElementById('agentsList');list.innerHTML=agents.map((a,i)=>`<div class="agent-card"><div class="agent-card-header"><div class="agent-header-left"><span class="agent-avatar">🤖</span><input type="text" class="agent-name-input" value="${a.name}" data-field="name"></div><button class="btn-danger" data-action="remove" data-index="${i}">Удалить</button></div><div class="agent-card-body"><div class="form-group"><label>API Endpoint</label><input type="text" value="${a.endpoint}" data-field="endpoint"><div class="api-suggestions" style="display:none"><button type="button" class="suggestion-btn" data-provider="openai">🤖 OpenAI</button><button type="button" class="suggestion-btn" data-provider="anthropic">🧠 Claude</button><button type="button" class="suggestion-btn" data-provider="google">✨ Gemini</button></div></div><div class="form-group"><label>API Key</label><input type="password" value="${a.apiKey}" data-field="apiKey"></div><div class="form-group"><label>Model</label><input type="text" value="${a.model}" data-field="model" class="model-input"></div><div class="form-row"><div class="form-group"><label>Temperature</label><input type="number" step="0.1" min="0" max="2" value="${a.temperature}" data-field="temperature"></div><div class="form-group"><label>Max Tokens</label><input type="number" value="${a.maxTokens}" data-field="maxTokens"></div></div></div></div>`).join('');
list.querySelectorAll('input').forEach(inp=>{inp.addEventListener('input',e=>{const card=e.target.closest('.agent-card');const idx=Array.from(list.children).indexOf(card);const agent=agents[idx];const field=e.target.dataset.field;let value=e.target.value;if(field==='temperature')value=value===''?null:parseFloat(value);else if(field==='maxTokens')value=parseInt(value);agent[field]=value;if(field==='endpoint'&&e.target.classList.contains('endpoint-input')){const sug=e.target.parentElement.querySelector('.api-suggestions');if(sug)sug.style.display='flex'}});if(inp.classList.contains('endpoint-input')){inp.addEventListener('focus',e=>{const sug=e.target.parentElement.querySelector('.api-suggestions');if(sug)sug.style.display='flex'});inp.addEventListener('blur',e=>{setTimeout(()=>{const sug=e.target.parentElement.querySelector('.api-suggestions');if(sug)sug.style.display='none'},200)})}});
list.querySelectorAll('.suggestion-btn').forEach(btn=>{btn.addEventListener('click',e=>{const card=e.target.closest('.agent-card');const idx=Array.from(list.children).indexOf(card);const agent=agents[idx];const prov=API_PROVIDERS[e.target.dataset.provider];if(prov){agent.endpoint=prov.defaultEndpoint;agent.model=prov.defaultModels[0];renderAgents()}})});
list.querySelectorAll('[data-action="remove"]').forEach(btn=>{btn.addEventListener('click',()=>{const i=parseInt(btn.dataset.index);agents.splice(i,1);renderAgents()})})}
document.getElementById('addAgentBtn').addEventListener('click',()=>{if(agents.length>=20){showNotif('Максимум 20 агентов');return}agents.push(new Agent({name:`Agent ${agents.length+1}`}));renderAgents()});
document.getElementById('saveConfigBtn').addEventListener('click',()=>{if(agents.length===0){showNotif('Добавьте агента');return}localStorage.setItem('agentsConfig',JSON.stringify(agents.map(a=>({id:a.id,name:a.name,endpoint:a.endpoint,apiKey:a.apiKey,model:a.model,temperature:a.temperature,maxTokens:a.maxTokens}))));showNotif('✅ Сохранено! Теперь используйте API ключи для работы')});
const saved=localStorage.getItem('agentsConfig');if(saved){agents=JSON.parse(saved).map(c=>new Agent(c));renderAgents()}
</script>
</body>
</html>
